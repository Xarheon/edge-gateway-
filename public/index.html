<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Xarheon Edge - Wasmer</title>
    <meta http-equiv="refresh" content="5">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            font-family: 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid rgba(0,255,255,0.3);
            max-width: 600px;
            margin: 20px;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .status {
            color: #00ff00;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .info {
            color: #888;
            margin-top: 30px;
            font-size: 0.8rem;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ XARHEON EDGE</h1>
        <p>Wasmer Edge Function Platform</p>
        <div class="status pulse">● SYSTEM OPERATIONAL</div>
        <div class="info">Proxy ready | x-host header required</div>
    </div>
</body>
</html>
